<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentRewind Launch Film</title>
<link rel="stylesheet" href="film.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="Scene1_Logs.jsx"></script>
<script type="text/babel" src="Scene2_3_Logo.jsx"></script>
<script type="text/babel" src="Scene4_5_Diagnose.jsx"></script>
<script type="text/babel" src="Scene6_7_Inspect_Edit.jsx"></script>
<script type="text/babel" src="Scene8_9_10_Replay_Compare_Close.jsx"></script>

<script type="text/babel">
const { Stage } = window;

function Film() {
  return (
    <Stage width={1920} height={1080} duration={52} background="#05070b" persistKey="agentrewind-film">
      <div className="film-bg" />
      <Scene1Logs />
      <Scene2TraceDust />
      <Scene3Logo />
      <Scene4Upload />
      <Scene5Diagnosis />
      <Scene6Contradictions />
      <Scene7Edit />
      <Scene8Replay />
      <Scene9Compare />
      <Scene10Close />
      <div className="film-grain" />
      <div className="vignette" />
      <div className="letterbox top" />
      <div className="letterbox bottom" />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Film />);
</script>
</body>
</html>
